<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEX - Sistema Integral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root { --sipa-primary: #800000; --sipa-bg-sidebar: #1e293b; --sipa-body-bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--sipa-body-bg); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        #sidebar { width: 260px; background-color: var(--sipa-bg-sidebar); min-height: 100vh; color: white; }
        .nav-link { color: #cbd5e1 !important; cursor: pointer; }
        .nav-link.active { background-color: #334155; color: white !important; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #333;">
    <div class="card p-4" style="width: 400px;">
        <h3 class="text-center">SIPEX</h3>
        <form id="login-form">
            <input type="email" id="login-email" class="form-control mb-2" placeholder="Correo" required>
            <input type="password" id="login-password" class="form-control mb-3" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
    </div>
</div>

<!-- APP -->
<div id="app-container" style="display: none; display: flex;">
    <aside id="sidebar">
        <div class="p-4 text-center"><h5>SIPEX</h5></div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" onclick="switchView('view-dashboard')"><i class="bi bi-grid"></i> Dashboard</a>
            <a class="nav-link" onclick="switchView('view-reingresos')"><i class="bi bi-arrow-return-left"></i> Registrar Reingreso</a>
            <a class="nav-link" onclick="switchView('view-consultas-reingresos')"><i class="bi bi-search"></i> Consultar Reingresos</a>
            <a class="nav-link" onclick="cerrarSesion()"><i class="bi bi-box-arrow-left"></i> Salir</a>
        </nav>
    </aside>

    <main id="main-content" class="p-4 flex-grow-1">
        <section id="view-dashboard" class="view-section active"><h3>Dashboard Principal</h3></section>

        <section id="view-reingresos" class="view-section">
            <div class="card p-4">
                <div class="row g-3 mb-3">
                    <div class="col-md-3"><input type="date" class="form-control" id="re-fecha"></div>
                    <div class="col-md-3"><select id="re-solicitante" class="form-select"><option value="ALFREDO CRUZADO">ALFREDO CRUZADO</option></select></div>
                    <div class="col-md-3"><select id="re-local" class="form-select"><option value="SÓTANO NCPP">SÓTANO NCPP</option></select></div>
                    <div class="col-md-3"><select id="re-entregado" class="form-select"><option value="RAÚL RODRIGUEZ">RAÚL RODRIGUEZ</option></select></div>
                </div>
                <table class="table" id="tabla-reingresos">
                    <thead><tr><th>Paquete</th><th>Expediente</th><th>Folios</th><th>Juzgado</th><th>Tipo</th><th>Acomp.</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
                <button class="btn btn-dark" onclick="agregarFilaReingreso()">+ Agregar</button>
                <button class="btn btn-primary" onclick="guardarReingreso()">Guardar Registro</button>
            </div>
        </section>

        <section id="view-consultas-reingresos" class="view-section">
            <div class="card p-4">
                <table class="table">
                    <thead><tr><th>Fecha</th><th>Solicitante</th><th>Local</th><th>Expedientes</th><th>Acción</th></tr></thead>
                    <tbody id="tabla-historial-reingresos"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🚨 PEGA TUS CREDENCIALES AQUÍ
    const firebaseConfig = {
  apiKey: "AIzaSyDaVsm4cs9O-R0plj1hk62Iy1uU2IYZLfc",
  authDomain: "sipa-d4ec9.firebaseapp.com",
  projectId: "sipa-d4ec9",
  storageBucket: "sipa-d4ec9.firebasestorage.app",
  messagingSenderId: "560354492263",
  appId: "1:560354492263:web:653ac26f811153537c79c2"
};

    // Funciones UI
    window.switchView = (id) => {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-consultas-reingresos') cargarHistorialReingresos();
    };

    window.agregarFilaReingreso = () => {
        document.querySelector('#tabla-reingresos tbody').insertAdjacentHTML('beforeend', `<tr>
            <td><input type="text" class="form-control form-control-sm"></td>
            <td><input type="text" class="form-control form-control-sm"></td>
            <td><input type="number" class="form-control form-control-sm"></td>
            <td><input type="text" class="form-control form-control-sm"></td>
            <td><select class="form-select form-select-sm"><option value="Transitorio">Transitorio</option><option value="Definitivo">Definitivo</option></select></td>
            <td><input type="number" class="form-control form-control-sm"></td>
            <td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">X</button></td>
        </tr>`);
    };

    window.guardarReingreso = async () => {
        const datos = {
            fecha: document.getElementById('re-fecha').value,
            solicitante: document.getElementById('re-solicitante').value,
            local: document.getElementById('re-local').value,
            entregado: document.getElementById('re-entregado').value,
            expedientes: Array.from(document.querySelectorAll("#tabla-reingresos tbody tr")).map(tr => {
                const i = tr.querySelectorAll('input, select');
                return { paquete: i[0].value, exp: i[1].value, folios: i[2].value, juzgado: i[3].value, tipo: i[4].value, acomp: i[5].value };
            })
        };
        await addDoc(collection(db, 'reingresos'), datos);
        Swal.fire('Guardado', 'Registro exitoso', 'success');
        document.querySelector('#tabla-reingresos tbody').innerHTML = '';
    };

    async function cargarHistorialReingresos() {
        const q = await getDocs(collection(db, "reingresos"));
        const tbody = document.getElementById('tabla-historial-reingresos');
        tbody.innerHTML = '';
        q.forEach(d => {
            const data = d.data();
            tbody.innerHTML += `<tr><td>${data.fecha}</td><td>${data.solicitante}</td><td>${data.local}</td><td>${data.expedientes.length}</td>
            <td><button class="btn btn-sm btn-danger" onclick="generarPDFDeConsulta('${d.id}')">PDF</button></td></tr>`;
        });
    }

    window.generarPDFDeConsulta = async (id) => {
        const docSnap = await getDoc(doc(db, "reingresos", id));
        generarReporte(docSnap.data());
    };

    window.generarReporte = (data) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("REPORTE DE EXPEDIENTES REINGRESADOS", 105, 15, { align: "center" });
        doc.setFontSize(8);
        doc.text(`Solicitante: ${data.solicitante} | Local: ${data.local} | Fecha: ${data.fecha}`, 15, 25);
        
        doc.autoTable({
            startY: 35,
            head: [['Nº', 'PAQUETE', 'EXPEDIENTE', 'FOLIOS', 'JUZGADO', 'TIPO', 'ACOMP.']],
            body: data.expedientes.map((e, i) => [i+1, e.paquete, e.exp, e.folios, e.juzgado, e.tipo, e.acomp])
        });
        
        doc.save(`REINGRESOS_${data.fecha}.pdf`);
    };

    // Auth
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
            document.getElementById('login-container').style.display = 'none';
        } catch(e) { Swal.fire('Error', 'Credenciales fallidas', 'error'); }
    });

    window.cerrarSesion = () => { signOut(auth); location.reload(); };
    document.getElementById('re-fecha').valueAsDate = new Date();
</script>
</body>
</html>
