<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEX - Sistema Completo</title>
    <!-- Tus estilos originales -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root { --sipa-primary: #800000; --sipa-bg-sidebar: #1e293b; --sipa-body-bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--sipa-body-bg); }
        .view-section { display: none; } .view-section.active { display: block; }
        #sidebar { width: 260px; background-color: var(--sipa-bg-sidebar); min-height: 100vh; color: white; }
        .nav-link { color: #cbd5e1 !important; cursor: pointer; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #333;">
    <div class="card p-4" style="width: 400px;">
        <h3 class="text-center">SIPEX - Login</h3>
        <input type="email" id="login-email" class="form-control mb-2" placeholder="Correo">
        <input type="password" id="login-password" class="form-control mb-3" placeholder="Contraseña">
        <button id="btn-login" class="btn btn-primary w-100">Ingresar</button>
    </div>
</div>

<!-- APP -->
<div id="app-container" style="display: none; display: flex;">
    <aside id="sidebar">
        <div class="p-4 text-center"><h5>SIPEX</h5></div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" onclick="switchView('view-dashboard')">Dashboard</a>
            <a class="nav-link" onclick="switchView('view-inventario')">Cargar Inventario</a>
            <a class="nav-link" onclick="switchView('view-reingresos')">Registrar Reingreso</a>
            <a class="nav-link" onclick="switchView('view-consultas-reingresos')">Consultar Reingresos</a>
            <a class="nav-link" onclick="location.reload()">Cerrar Sesión</a>
        </nav>
    </aside>

    <main id="main-content" class="p-4 flex-grow-1">
        <!-- Dashboard y otras secciones originales -->
        <section id="view-dashboard" class="view-section active"><h3>Dashboard</h3></section>
        
        <!-- MÓDULO REINGRESOS (COMPLETO) -->
        <section id="view-reingresos" class="view-section">
            <div class="card p-4">
                <div class="row g-3 mb-3">
                    <div class="col-md-3"><input type="date" id="re-fecha" class="form-control"></div>
                    <div class="col-md-3"><select id="re-solicitante" class="form-select"></select></div>
                    <div class="col-md-3"><select id="re-local" class="form-select"></select></div>
                    <div class="col-md-3"><select id="re-entregado" class="form-select"></select></div>
                </div>
                <table class="table" id="tabla-reingresos">
                    <thead><tr><th>Paquete</th><th>Expediente</th><th>Folios</th><th>Juzgado</th><th>Tipo</th><th>Acomp.</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
                <button class="btn btn-dark" onclick="agregarFilaReingreso()">+ Agregar Fila</button>
                <button class="btn btn-primary" onclick="guardarReingreso()">Guardar Registro</button>
            </div>
        </section>

        <!-- CONSULTA REINGRESOS -->
        <section id="view-consultas-reingresos" class="view-section">
            <div class="card p-4">
                <h5>Historial de Reingresos</h5>
                <table class="table">
                    <thead><tr><th>Fecha</th><th>Solicitante</th><th>Local</th><th>Expedientes</th><th>PDF</th></tr></thead>
                    <tbody id="tabla-historial-reingresos"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🚨 CONFIGURACIÓN FIREBASE (Mantén la tuya aquí)
    const firebaseConfig = {
  apiKey: "AIzaSyDaVsm4cs9O-R0plj1hk62Iy1uU2IYZLfc",
  authDomain: "sipa-d4ec9.firebaseapp.com",
  projectId: "sipa-d4ec9",
  storageBucket: "sipa-d4ec9.firebasestorage.app",
  messagingSenderId: "560354492263",
  appId: "1:560354492263:web:653ac26f811153537c79c2"
};

    // Funciones
    window.switchView = (id) => {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-consultas-reingresos') cargarHistorial();
    };

    window.agregarFilaReingreso = () => {
        document.querySelector('#tabla-reingresos tbody').insertAdjacentHTML('beforeend', `<tr>
            <td><input type="text" class="form-control form-control-sm pac"></td>
            <td><input type="text" class="form-control form-control-sm exp"></td>
            <td><input type="number" class="form-control form-control-sm fol"></td>
            <td><input type="text" class="form-control form-control-sm juz"></td>
            <td><select class="form-select form-select-sm tip"><option>Transitorio</option><option>Definitivo</option></select></td>
            <td><input type="number" class="form-control form-control-sm aco"></td>
            <td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">X</button></td>
        </tr>`);
    };

    window.guardarReingreso = async () => {
        const datos = {
            fecha: document.getElementById('re-fecha').value,
            solicitante: document.getElementById('re-solicitante').value,
            local: document.getElementById('re-local').value,
            entregado: document.getElementById('re-entregado').value,
            expedientes: Array.from(document.querySelectorAll("#tabla-reingresos tbody tr")).map(tr => ({
                paquete: tr.querySelector('.pac').value,
                exp: tr.querySelector('.exp').value,
                folios: tr.querySelector('.fol').value,
                juzgado: tr.querySelector('.juz').value,
                tipo: tr.querySelector('.tip').value,
                acomp: tr.querySelector('.aco').value
            }))
        };
        await addDoc(collection(db, 'reingresos'), datos);
        Swal.fire('Éxito', 'Guardado correctamente', 'success');
    };

    async function cargarHistorial() {
        const querySnapshot = await getDocs(collection(db, "reingresos"));
        const tbody = document.getElementById('tabla-historial-reingresos');
        tbody.innerHTML = '';
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            tbody.innerHTML += `<tr>
                <td>${data.fecha}</td><td>${data.solicitante}</td><td>${data.local}</td><td>${data.expedientes.length}</td>
                <td><button class="btn btn-sm btn-primary" onclick='generarPDF(${JSON.stringify(data)})'>PDF</button></td>
            </tr>`;
        });
    }

    window.generarPDF = (data) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("REPORTE DE EXPEDIENTES REINGRESADOS", 105, 15, { align: "center" });
        doc.setFontSize(9);
        doc.text(`Solicitante: ${data.solicitante} | Fecha: ${data.fecha}`, 15, 25);
        doc.autoTable({
            startY: 40,
            head: [['Nº', 'PAQUETE', 'EXPEDIENTE', 'FOLIOS', 'JUZGADO', 'TIPO', 'ACOMP.']],
            body: data.expedientes.map((e, i) => [i+1, e.paquete, e.exp, e.folios, e.juzgado, e.tipo, e.acomp])
        });
        doc.save(`REINGRESOS_${data.fecha}.pdf`);
    };

    document.getElementById('btn-login').onclick = async () => {
        await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
    };
    document.getElementById('re-fecha').valueAsDate = new Date();
</script>
</body>
</html>
